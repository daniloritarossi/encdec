<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ENCDEC logo: a man putting on a mask">
  <defs>
    <linearGradient id="maskGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <path id="binPath" d="M256,68 a188,188 0 1,1 -0.01,0" fill="none"/>
  </defs>

  <!-- badge -->
  <circle cx="256" cy="256" r="248" fill="#0e1726"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="url(#ringGrad)" stroke-width="6"/>

  <!-- binary ring -->
  <text font-family="'Courier New',monospace" font-size="16" fill="#38bdf8" opacity="0.28" letter-spacing="6">
    <textPath href="#binPath">01000101 01001110 01000011 01000100 01000101 01000011 001100 010011 0110</textPath>
  </text>

  <!-- shoulders -->
  <path d="M150,470 Q160,380 256,378 Q352,380 362,470 Z" fill="#1e293b"/>
  <path d="M150,470 Q160,380 256,378 Q352,380 362,470 Z" fill="none" stroke="#334155" stroke-width="3"/>

  <!-- neck -->
  <rect x="232" y="330" width="48" height="60" rx="16" fill="#e8eef7"/>

  <!-- head -->
  <ellipse cx="256" cy="235" rx="104" ry="122" fill="#f1f5f9"/>

  <!-- hair -->
  <path d="M152,225 Q148,110 256,105 Q364,110 360,225 Q356,180 322,160 Q290,146 232,150 Q186,155 172,205 Q166,215 164,232 Q156,235 152,225 Z" fill="#1e293b"/>

  <!-- mask ribbons -->
  <path d="M158,212 Q110,205 84,182" fill="none" stroke="#0ea5e9" stroke-width="7" stroke-linecap="round"/>
  <path d="M354,212 Q402,205 428,182" fill="none" stroke="#14b8a6" stroke-width="7" stroke-linecap="round"/>

  <!-- domino mask -->
  <path d="M152,206
           Q256,176 360,206
           Q368,244 336,256
           Q296,268 256,260
           Q216,268 176,256
           Q144,244 152,206 Z"
        fill="url(#maskGrad)" stroke="#0b1220" stroke-width="4"/>

  <!-- eye holes -->
  <ellipse cx="212" cy="223" rx="27" ry="14" fill="#f1f5f9"/>
  <ellipse cx="300" cy="223" rx="27" ry="14" fill="#f1f5f9"/>
  <circle cx="212" cy="224" r="7" fill="#0e1726"/>
  <circle cx="300" cy="224" r="7" fill="#0e1726"/>

  <!-- cipher glyphs on mask -->
  <text x="256" y="250" text-anchor="middle" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#0b1220" opacity="0.55">0 1</text>
  <text x="176" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#0b1220" opacity="0.45">#</text>
  <text x="338" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#0b1220" opacity="0.45">*</text>

  <!-- nose + mouth -->
  <path d="M256,262 Q250,290 244,296 Q252,303 262,299" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M228,324 Q256,340 284,324" fill="none" stroke="#475569" stroke-width="5" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="256" y="446" text-anchor="middle" font-family="'Courier New',monospace" font-size="46" font-weight="bold" fill="#e2e8f0" letter-spacing="8">ENCDEC</text>
  <text x="256" y="472" text-anchor="middle" font-family="'Courier New',monospace" font-size="15" fill="#38bdf8" letter-spacing="2">mask your secrets</text>
</svg>
